name: phase4-ci

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Syntax check
        run: python -m compileall app scripts tests
      - name: Unit tests
        env:
          SRWB_ENV: development
          SRWB_SECRET_KEY: test-secret-key
        run: python -m unittest discover -s tests -p "test_*.py"
      - name: Build release bundle
        run: python scripts/build_release_bundle.py
      - name: Validate release bundle
        run: python scripts/validate_release_bundle.py dist/opswebmobile-phase4-export-release.zip
